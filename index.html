<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel = "icon" href="images/favicon.ico" type="image/x-icon" />
        <title>Trivia Blast</title>
        <link rel="stylesheet" href="style.css"/>
        <script src="script.js" defer></script>
    </head>
    <body class="overall_page">

        <!-- Header Image / Logo for the game -->
        <header>
            <img class="title" src="Images/logo.png" alt="Trivia Blast Header">
        </header>
        

        <div id="welcome-screen" class="btn">
            <div class="selector-container">
                <label for="category-select">Choose a Topic:</label>
                <select id="category-select">
                    <option value="">Any Category</option>
                    <option value="9">General Knowledge</option>
                    <option value="11">Movies</option>
                    <option value="12">Music</option>
                    <option value="15">Video Games</option>
                    <option value="17">Science & Nature</option>
                    <option value="23">History</option>
                </select>
                <select id="difficulty-select">
                    <option value="">Any Difficulty</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <button id="btn1" onclick="initQuiz()">PLAY</button>
        </div>




        <!--Code for the container the actual game is played in-->
        <div id="game-container" style="display:none;">
            <div class="game-top-bar">
                <img class="top-bar-logo" src="Images/logo.png" alt="Trivia Blast" style="visibility:hidden;">
                <div id="timer-container">
                    <span id="timer">15</span>s
                </div>
                <div id="progress-container">
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                    <span class="progress-dot"></span>
                </div>
                <div class="game-top-right">
                    <div id="score-container">Score: <span id="score">0</span></div>
                    <div id="lives-container">Lives:
                        <img class="heart" src="Images/heart.png">
                        <img class="heart" src="Images/heart.png">
                        <img class="heart" src="Images/heart.png">
                    </div>
                    <button class="top-bar-btn" onclick="location.reload()">Quit</button>
                </div>
            </div>

            <div class="question-banner">
                <h2>Waiting for Question 1</h2>
            </div>

            <div class="answers">
                <button class="answer-btn">..</button>
                <button class="answer-btn">..</button>
                <button class="answer-btn">..</button>
                <button class="answer-btn">..</button>
            </div>
        </div>
        

        <!-- We want to hide this end game content to appear only when the game is over -->
        <div id="game-over-container" style="display:none;">
            <div class="final-scores-container">
                <h2 id="game-over-heading"> Game Over and Nice Try!</h2>
                <p> Here is your scores:</p>
                    <p id="final-score">Final Score: </p>
                    <p id="questions-correct">Questions Correct: </p>   
                    <p id="high-score"> Personal Best: 0 </p>
                    <button id="restart-btn" onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </body>
</html>
